backend:
  name: github
  repo: drgkikas/drgkikas-astro
  branch: main

media_folder: "public/assets"
public_folder: "/assets"

collections:
  - name: "services"
    label: "Υπηρεσίες"
    folder: "src/content/services"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Icon", name: "icon", widget: "string", required: false}
      - {label: "Order", name: "order", widget: "number", default: 99}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "disorders"
    label: "Διαταραχές"
    folder: "src/content/disorders"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Order", name: "order", widget: "number", default: 99}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "rtms"
    label: "rTMS Pillar"
    folder: "src/content/rtms"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Order", name: "order", widget: "number", default: 99}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "farmakogonidiomatiki"
    label: "Φαρμακογονιδιωματική (PGx)"
    folder: "src/content/farmakogonidiomatiki"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Order", name: "order", widget: "number", default: 99}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "blog"
    label: "Άρθρα"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string", default: "Dr. Πασχάλης Γκίκας"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
